<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario de Personas</title>
    </head>
    <body>
        <h1>Formulario de Personas</h1>
        <form th:object="${persona}" th:action="@{/personas/guardar}" method="post">
            <input type="hidden" th:field="*{id}" />
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" th:field="*{nombre}" />
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" th:field="*{apellido}" />
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" />
            <label for="telefono">Telefono:</label>
            <input type="text" id="telefono" th:field="*{telefono}" />
            <label for="fechaNacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" />
            <button type="submit">Guardar</button>
        </form>
    </body>
</html>
