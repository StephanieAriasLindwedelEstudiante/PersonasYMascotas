<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lista de Mascotas</title>
    </head>
    <body>
        <h1>Lista de Mascotas</h1>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Raza</th>
                    <th>Especie</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="mascota : ${mascotas}">
                    <td th:text="${mascota.id}"></td>
                    <td th:text="${mascota.nombre}"></td>
                    <td th:text="${mascota.edad}"></td>
                    <td th:text="${mascota.raza}"></td>
                    <td th:text="${mascota.especie}"></td>
                    <td>
                        <a th:href="@{/mascotas/editar/{id}(id=${mascota.id})}">Editar</a>
                        <a th:href="@{/mascotas/eliminar/{id}(id=${mascota.id})}">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/}">Inicio</a>
    </body>
</html>
