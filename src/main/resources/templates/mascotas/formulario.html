<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario de Mascotas</title>
    </head>
    <body>
        <h1>Formulario de Mascotas</h1>
        <form th:object="${mascota}" th:action="@{/mascotas/guardar}" method="post">
            <input type="hidden" th:field="*{id}" />
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" th:field="*{nombre}" />
            <label for="edad">Edad:</label>
            <input type="number" id="edad" th:field="*{edad}" />
            <label for="raza">Raza:</label>
            <input type="text" id="raza" th:field="*{raza}" />
            <label for="especie">Especie:</label>
            <input type="text" id="especie" th:field="*{especie}" />
            <button type="submit">Guardar</button>
        </form>
        <a th:href="@{/}">Inicio</a>
    </body>
</html>
